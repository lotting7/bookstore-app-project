services:
  postgres:
    image: postgres:16-alpine
    container_name: bookstore-postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=bookstore
      - POSTGRES_USER=bookstore_user
      - POSTGRES_PASSWORD=bookstore_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
