# Server Configuration
server.port=8081

# Application Name
spring.application.name=Bookstore

# Database Connection Settings
spring.datasource.url=jdbc:postgresql://localhost:5433/bookstore
spring.datasource.username=bookstore_user
spring.datasource.password=bookstore_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Configuration
# We use 'validate' because Flyway manages the schema. Hibernate will only verify that our Java classes match the DB tables.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Development Spring Security User (temporary, for development purposes)
spring.security.user.name=user
spring.security.user.password=qwerty1
